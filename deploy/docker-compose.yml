services:
  zdashboard:
    image: zdashboard:latest
    container_name: zdashboard
    ports:
      - "${ZDASHBOARD_PORT}:3100"
    volumes:
      - ${ZDB_PATH}:/data/zdb.db
      - ${ZAUDIO_DIR}:/data/audio
    environment:
      - HOST=0.0.0.0
      - DB_PATH=/data/zdb.db
      - AUDIO_DIR=/data/audio
    restart: unless-stopped

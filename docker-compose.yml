services:
  zdashboard:
    build: .
    container_name: zdashboard
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      - PORT=3100
      - HOST=0.0.0.0
      - DB_PATH=/db/zdb.db
      - AUDIO_DIR=/audio
    volumes:
      # Database: authoritative location
      - /home/tony/zdb.db:/db/zdb.db
      # Audio files (zDashboard read/write)
      - zdashboard-audio:/audio
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  zdashboard-audio:
